apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmbrowser-api
  namespace: swarmbrowser
  labels:
    app: swarmbrowser-api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: swarmbrowser-api
  template:
    metadata:
      labels:
        app: swarmbrowser-api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: swarmbrowser-api
              topologyKey: kubernetes.io/hostname
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
      containers:
      - name: api
        image: sertonenet/swarmbrowser-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3500
          name: http
        env:
        - name: PORT
          value: "3500"
        - name: POOL_SIZE
          value: "3"
        - name: PAGE_TIMEOUT
          value: "30000"
        - name: MAX_USES
          value: "100"
        - name: NODE_LOCATION
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: OPS_CHAIN_RPC
          value: "https://demo.chainrpc.net"
        - name: OPS_CHAIN_ID
          value: "845312"
        - name: USDC_ADDRESS
          value: "0xb081d16D40e4e4c27D6d8564d145Ab2933037111"
        - name: SWARMPLAN_ADDRESS
          valueFrom:
            configMapKeyRef:
              name: swarmbrowser-config
              key: swarmplan-address
              optional: true
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        resources:
          requests:
            cpu: 500m
            memory: 1536Mi
          limits:
            cpu: 2000m
            memory: 3072Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3500
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3500
          initialDelaySeconds: 30
          periodSeconds: 10
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
